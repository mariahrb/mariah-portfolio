<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariah Valley — v3</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<style>
:root {
  --pixel: 'Press Start 2P', monospace;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --dark: #0e0e1c; --cream: #faf7f0;
  --accent: #e8573a; --gold: #f0c040;
  --mint: #5ec4a0; --sky: #7ec8e3; --lav: #9b7ec8;
  --text: #1c1c2e; --muted: #888;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#0e0e1c; cursor:default; }

#game-canvas-container { position:fixed; inset:0; }

/* ── SPLASH ── */
#splash {
  position:fixed; inset:0; z-index:500;
  background:#0e0e1c;
  pointer-events:none; opacity:0;
  transition:opacity 0.4s ease;
}
#splash.in  { opacity:1; pointer-events:all; }
#splash.out { opacity:0; }

/* ── LANDING HTML LAYER ── */
#landing {
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none; /* Phaser canvas is behind, this layer handles clicks */
}
#landing.hidden { display:none; }

.land-ui {
  position:relative; z-index:5;
  display:flex; flex-direction:column;
  align-items:center; gap:0;
  animation:fadeUp 0.9s 0.4s both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.land-eyebrow {
  font-family:var(--pixel); font-size:clamp(7px,1vw,10px);
  color:var(--sky); letter-spacing:4px; margin-bottom:14px;
  pointer-events:all;
}
.land-title {
  font-family:var(--pixel); font-size:clamp(30px,6vw,68px);
  color:var(--gold); text-align:center; line-height:1.5;
  text-shadow:4px 4px 0 #9a6800, 0 0 60px rgba(240,192,64,0.25);
  margin-bottom:10px; pointer-events:all;
}
.land-sub {
  font-family:var(--pixel); font-size:clamp(7px,1vw,9px);
  color:rgba(255,255,255,0.4); letter-spacing:3px;
  margin-bottom:44px; pointer-events:all;
}

.mode-row {
  display:flex; gap:0; margin-bottom:28px;
  pointer-events:all;
}
.mode-btn {
  font-family:var(--pixel); font-size:clamp(7px,.9vw,10px);
  padding:14px 24px; cursor:pointer;
  border:2px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.03);
  color:rgba(255,255,255,0.4);
  transition:all .2s; letter-spacing:1px;
}
.mode-btn.gm { border-color:var(--gold);  color:var(--gold);  background:rgba(240,192,64,.08); box-shadow:0 0 16px rgba(240,192,64,.15); }
.mode-btn.pr { border-color:var(--sky);   color:var(--sky);   background:rgba(126,200,227,.08); box-shadow:0 0 16px rgba(126,200,227,.15); }
.mode-btn:first-child { border-right-width:1px; }

.pro-nav {
  display:flex; flex-wrap:wrap; justify-content:center; gap:10px;
  max-height:0; overflow:hidden; opacity:0;
  transition:all .4s ease; margin-bottom:0;
  pointer-events:none;
}
.pro-nav.show { max-height:200px; opacity:1; margin-bottom:22px; pointer-events:all; }
.pro-link {
  font-family:var(--pixel); font-size:clamp(6px,.8vw,9px);
  padding:9px 14px; cursor:pointer;
  border:1px solid rgba(126,200,227,.3);
  color:rgba(126,200,227,.7); background:transparent;
  transition:all .2s;
}
.pro-link:hover { border-color:var(--sky); color:var(--sky); background:rgba(126,200,227,.07); }

.cta-btn {
  font-family:var(--pixel); font-size:clamp(8px,1vw,11px);
  padding:16px 32px; cursor:pointer;
  background:var(--gold); color:var(--dark);
  border:none; box-shadow:4px 4px 0 #9a6800;
  transition:all .1s; letter-spacing:1px;
  pointer-events:all;
}
.cta-btn:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 #9a6800; }
.cta-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #9a6800; }
.cta-btn.pro { background:var(--sky); box-shadow:4px 4px 0 #2a7a9a; }
.cta-btn.pro:hover { box-shadow:6px 6px 0 #2a7a9a; }

.land-version {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  font-family:var(--pixel); font-size:7px;
  color:rgba(255,255,255,.15); letter-spacing:2px;
  pointer-events:none;
}

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:60;
  display:none;
}
.hud-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 18px;
  background:linear-gradient(180deg,rgba(8,8,16,.92) 0%,transparent 100%);
}
.hud-name { font-family:var(--pixel); font-size:10px; color:var(--gold); }
.hud-btns { display:flex; gap:10px; }
.hud-btn {
  font-family:var(--pixel); font-size:8px; padding:7px 12px;
  cursor:pointer; border:1px solid rgba(255,255,255,.2);
  background:rgba(8,8,16,.8); color:rgba(255,255,255,.7);
  transition:all .2s;
}
.hud-btn:hover { border-color:var(--gold); color:var(--gold); }

/* ── DIALOGUE BOX ── */
#dialogue {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  z-index:70; width:min(580px,92vw);
  background:rgba(10,10,24,.96);
  border:2px solid var(--gold);
  display:none;
  animation:dlgIn .25s ease;
}
@keyframes dlgIn { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.dlg-speaker {
  font-family:var(--pixel); font-size:9px;
  color:var(--gold); padding:10px 16px 0;
  border-bottom:1px solid rgba(240,192,64,.2);
  padding-bottom:8px; margin-bottom:0;
}
.dlg-body {
  font-family:var(--pixel); font-size:8px;
  color:#fff; padding:12px 16px;
  line-height:1.9; min-height:48px;
}
.dlg-choices { padding:0 16px 14px; display:flex; flex-direction:column; gap:8px; }
.dlg-choice {
  font-family:var(--pixel); font-size:8px;
  color:var(--gold); background:rgba(240,192,64,.06);
  border:1px solid rgba(240,192,64,.3);
  padding:9px 14px; cursor:pointer; text-align:left;
  transition:all .15s;
}
.dlg-choice:hover { background:rgba(240,192,64,.15); border-color:var(--gold); color:#fff; }

/* ── INTERACT PROMPT ── */
#prompt {
  position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
  z-index:65;
  font-family:var(--pixel); font-size:8px; color:#fff;
  background:rgba(10,10,24,.9); border:1.5px solid var(--gold);
  padding:8px 16px; display:none; white-space:nowrap;
  animation:bob .6s ease-in-out infinite alternate;
}
@keyframes bob { from{transform:translateX(-50%) translateY(0)} to{transform:translateX(-50%) translateY(-5px)} }

/* ── CONTROLS HINT ── */
#hint {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  font-family:var(--pixel); font-size:7px;
  color:rgba(255,255,255,.35);
  background:rgba(8,8,16,.7); border:1px solid rgba(255,255,255,.1);
  padding:7px 16px; display:none; white-space:nowrap; letter-spacing:1px;
}

/* ── PAGE OVERLAY ── */
#page {
  position:fixed; inset:0; z-index:150;
  overflow-y:auto; display:none; opacity:0;
  transition:opacity .35s ease;
}
#page.vis { opacity:1; }
#page.default { background:var(--cream); }
#page.design  { background:#fdf5ec; }
#page.dark    { background:#0e0e1c; }

.pg { max-width:960px; margin:0 auto; padding:clamp(40px,6vw,80px) clamp(24px,5vw,60px); min-height:100vh; }

.pg-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:clamp(32px,5vw,56px); flex-wrap:wrap; gap:12px; }
.pg-back {
  font-family:var(--pixel); font-size:8px; padding:9px 15px;
  cursor:pointer; border:1.5px solid; background:transparent; transition:all .2s;
}
.pg-back.game-src { color:var(--mint); border-color:var(--mint); }
.pg-back.land-src { color:var(--accent); border-color:var(--accent); }
.pg-back:hover { background:rgba(0,0,0,.06); }
.pg-pills { display:flex; flex-wrap:wrap; gap:8px; }
.pg-pill {
  font-family:var(--pixel); font-size:7px; padding:7px 11px;
  cursor:pointer; border:1px solid rgba(0,0,0,.12);
  background:transparent; color:rgba(0,0,0,.38); transition:all .2s;
}
.pg-pill:hover,.pg-pill.on { border-color:var(--accent); color:var(--accent); }
.pg-pill.dk { border-color:rgba(255,255,255,.15); color:rgba(255,255,255,.3); }
.pg-pill.dk:hover,.pg-pill.dk.on { border-color:var(--gold); color:var(--gold); }

.pg-tag { font-family:var(--pixel); font-size:clamp(7px,.9vw,9px); letter-spacing:3px; margin-bottom:12px; color:var(--accent); }
.pg-tag.dk { color:var(--gold); }
.pg-h1 { font-family:var(--serif); font-size:clamp(42px,7vw,84px); line-height:1.05; margin-bottom:18px; color:var(--text); }
.pg-h1.lt { color:#fff; }
.pg-h1 em { color:var(--accent); font-style:italic; }
.pg-rule { width:48px; height:3px; background:var(--accent); margin-bottom:26px; }
.pg-rule.gd { background:var(--gold); }
.pg-lead { font-size:clamp(15px,2vw,18px); line-height:1.8; color:#555; max-width:600px; }
.pg-lead.lt { color:rgba(255,255,255,.6); }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; margin-top:40px; }
.card { background:#fff; border:1px solid #ece7db; padding:26px; transition:transform .2s,box-shadow .2s; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--bar,var(--accent)); transform:scaleX(0); transform-origin:left; transition:transform .3s; }
.card:hover::before { transform:scaleX(1); }
.card:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,.08); }
.card-dk { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); }
.card-ds { background:#fff8f2; border:1px solid #f0e0cc; }
.c-num { font-family:var(--pixel); font-size:8px; color:var(--accent); margin-bottom:12px; }
.c-title { font-family:var(--serif); font-size:22px; color:var(--text); margin-bottom:9px; }
.c-title.lt { color:#fff; }
.c-body { font-size:14px; color:#666; line-height:1.7; }
.c-body.lt { color:rgba(255,255,255,.58); }
.tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
.tag { font-size:11px; padding:4px 10px; background:#f0ece2; color:#666; }
.tag-dk { background:rgba(255,255,255,.08); color:rgba(255,255,255,.55); }

.tl { display:flex; flex-direction:column; gap:24px; margin-top:28px; }
.tl-item { padding-left:22px; border-left:3px solid var(--accent); }
.tl-role { font-weight:600; color:var(--text); margin-bottom:4px; }
.tl-date { font-family:var(--pixel); font-size:7px; color:var(--muted); margin-bottom:8px; }
.tl-desc { font-size:14px; color:#666; line-height:1.7; }

.form { display:flex; flex-direction:column; gap:12px; max-width:480px; margin-top:36px; }
.form input,.form textarea {
  padding:13px 15px; border:1.5px solid #ddd;
  font-size:15px; font-family:var(--sans);
  outline:none; background:#fff; transition:border-color .2s;
}
.form input:focus,.form textarea:focus { border-color:var(--accent); }
.form textarea { resize:vertical; min-height:110px; }

.btn-p {
  font-family:var(--pixel); font-size:9px; padding:13px 22px;
  background:var(--text); color:var(--gold);
  border:2px solid var(--text); cursor:pointer;
  box-shadow:3px 3px 0 rgba(0,0,0,.2); transition:all .1s;
}
.btn-p:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 rgba(0,0,0,.2); }
.btn-o {
  font-family:var(--pixel); font-size:9px; padding:11px 18px;
  background:transparent; color:var(--text);
  border:2px solid var(--text); cursor:pointer; transition:all .2s;
}
.btn-o:hover { background:var(--text); color:var(--cream); }
.btn-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }

.skills { display:flex; flex-direction:column; gap:13px; margin-top:26px; }
.sk-item { display:flex; flex-direction:column; gap:5px; }
.sk-lbl { display:flex; justify-content:space-between; font-size:13px; color:#555; }
.sk-bar { height:5px; background:#ece7db; }
.sk-fill { height:100%; background:var(--fill,var(--accent)); transition:width 1.2s cubic-bezier(.4,0,.2,1); }

/* Mobile dpad */
#dpad {
  position:fixed; bottom:18px; left:18px; z-index:70;
  display:none;
  grid-template-columns:repeat(3,46px);
  grid-template-rows:repeat(3,46px);
  gap:3px;
}
.dp {
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.25);
  border-radius:6px; font-size:14px; color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
}
.dp:active { background:rgba(255,255,255,.25); }
#ekey {
  position:fixed; bottom:18px; right:18px; z-index:70;
  display:none; width:66px; height:66px; border-radius:50%;
  font-family:var(--pixel); font-size:10px;
  background:rgba(240,192,64,.15); border:2px solid var(--gold); color:var(--gold);
  cursor:pointer; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
}

/* Achievement toast */
#toast {
  position:fixed; top:70px; right:20px; z-index:200;
  font-family:var(--pixel); font-size:8px;
  background:rgba(10,10,24,.95); border:2px solid var(--gold);
  color:#fff; padding:12px 18px; display:none;
  max-width:260px; line-height:1.8;
  animation:toastIn .3s ease;
}
@keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>

<div id="splash"></div>
<div id="game-canvas-container"></div>

<!-- LANDING UI (floats over Phaser canvas) -->
<div id="landing">
  <div class="land-ui">
    <div class="land-eyebrow">A PORTFOLIO EXPERIENCE</div>
    <div class="land-title">MARIAH<br>VALLEY</div>
    <div class="land-sub">FULL-STACK ENGINEER &nbsp;·&nbsp; V3.0</div>
    <div class="mode-row">
      <button class="mode-btn gm" id="btnGame" onclick="setMode('game')">🎮 &nbsp;GAME MODE</button>
      <button class="mode-btn" id="btnPro" onclick="setMode('pro')">📋 &nbsp;PROFESSIONAL</button>
    </div>
    <div class="pro-nav" id="proNav">
      <button class="pro-link" onclick="openPageFrom('home','land')">🏠 About</button>
      <button class="pro-link" onclick="openPageFrom('devlab','land')">💻 Projects</button>
      <button class="pro-link" onclick="openPageFrom('studio','land')">🎨 Design</button>
      <button class="pro-link" onclick="openPageFrom('innovation','land')">🌱 Startups</button>
      <button class="pro-link" onclick="openPageFrom('library','land')">📜 Resume</button>
      <button class="pro-link" onclick="openPageFrom('townhall','land')">📬 Contact</button>
    </div>
    <button class="cta-btn" id="ctaBtn" onclick="startGame()">▶ &nbsp;ENTER WORLD</button>
  </div>
  <div class="land-version">MARIAH VALLEY · V3.0 · 2025</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-bar">
    <div class="hud-name">⚡ MARIAH VALLEY</div>
    <div class="hud-btns">
      <button class="hud-btn" onclick="openPageFrom('home','game')">🏠 ABOUT</button>
      <button class="hud-btn" onclick="openPageFrom('devlab','game')">💻 WORK</button>
      <button class="hud-btn" onclick="backToLanding()">✕ EXIT</button>
    </div>
  </div>
</div>

<!-- DIALOGUE -->
<div id="dialogue">
  <div class="dlg-speaker" id="dlgSpeaker"></div>
  <div class="dlg-body" id="dlgBody"></div>
  <div class="dlg-choices" id="dlgChoices"></div>
</div>

<!-- INTERACT PROMPT -->
<div id="prompt"></div>

<!-- CONTROLS HINT -->
<div id="hint">↑↓←→ MOVE &nbsp;│&nbsp; E INTERACT &nbsp;│&nbsp; ESC CLOSE</div>

<!-- PAGE OVERLAY -->
<div id="page"><div class="pg" id="pgContent"></div></div>

<!-- MOBILE -->
<div id="dpad">
  <div class="dp" id="dp-up" style="grid-column:2;grid-row:1">▲</div>
  <div class="dp" id="dp-left" style="grid-column:1;grid-row:2">◀</div>
  <div style="grid-column:2;grid-row:2;opacity:.15;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px">✦</div>
  <div class="dp" id="dp-right" style="grid-column:3;grid-row:2">▶</div>
  <div class="dp" id="dp-down" style="grid-column:2;grid-row:3">▼</div>
</div>
<button id="ekey" onclick="handleInteract()">E</button>

<!-- ACHIEVEMENT TOAST -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const TILE = 32;
const WW = 52, WH = 40; // world tiles

const BUILDINGS = [
  {id:'home',      x:8,  y:7,  w:6, h:5, label:'HOME',       sign:'🏠', pk:'home',       c:0xc87850, r:0xb06840},
  {id:'devlab',    x:32, y:7,  w:7, h:5, label:'DEV LAB',    sign:'💻', pk:'devlab',     c:0x4a6fa5, r:0x3a5f95},
  {id:'studio',    x:8,  y:23, w:6, h:5, label:'STUDIO',     sign:'🎨', pk:'studio',     c:0x9b5ea5, r:0x7b4a8b},
  {id:'innovation',x:32, y:23, w:7, h:5, label:'INNOVATION', sign:'🌱', pk:'innovation', c:0x3a8b5b, r:0x2a7a4b},
  {id:'library',   x:20, y:5,  w:6, h:5, label:'LIBRARY',    sign:'📜', pk:'library',    c:0x9b853a, r:0x7b6a2a},
  {id:'townhall',  x:20, y:29, w:6, h:5, label:'TOWN HALL',  sign:'📬', pk:'townhall',   c:0x6b4a9b, r:0x5a3a8b},
];

// ── NPC dialogue trees ──
const DIALOGUES = {
  'old-dev': {
    start:'intro',
    lines:{
      intro:{speaker:'Old Dev ⚙️', text:"Ah, a visitor! I've watched Mariah build this valley from scratch. Impressive stuff.", choices:[
        {text:'Tell me about her work', next:'projects'},
        {text:'What is she like?', next:'character'},
        {text:'Thanks, goodbye!', next:null},
      ]},
      projects:{speaker:'Old Dev ⚙️', text:'She once built a streaming platform handling 2M events a day. Want to see it?', choices:[
        {text:'Yes! Take me there.', action:'open:devlab'},
        {text:'Maybe later.', next:null},
      ]},
      character:{speaker:'Old Dev ⚙️', text:'Sharp, curious, and she actually ships. Rare combo. The Dev Lab tells the whole story.', choices:[
        {text:'Show me the Dev Lab', action:'open:devlab'},
        {text:'Good to know. Thanks!', next:null},
      ]},
    }
  },
  'designer': {
    start:'intro',
    lines:{
      intro:{speaker:'Pixel 🎨', text:'Oh hi! I live in the Studio. Mariah designed this whole valley, you know. Pretty meta, right?', choices:[
        {text:'Show me her design work', action:'open:studio'},
        {text:'Did she really build this game?', next:'meta'},
        {text:'Goodbye!', next:null},
      ]},
      meta:{speaker:'Pixel 🎨', text:"Ha! Yes — the portfolio IS the project. That's kind of her whole thing.", choices:[
        {text:'Love that. Show me.', action:'open:studio'},
        {text:"Cool, thanks!", next:null},
      ]},
    }
  },
  'scout': {
    start:'intro',
    lines:{
      intro:{speaker:'Scout 🔍', text:"I've been looking for Mariah everywhere. Have you seen her resume? It's in the Library.", choices:[
        {text:'Take me to the Library', action:'open:library'},
        {text:'I want to contact her', action:'open:townhall'},
        {text:"I'll find it myself", next:null},
      ]},
    }
  },
  'sage': {
    start:'intro',
    lines:{
      intro:{speaker:'Sage ✨', text:'Every great engineer builds things that outlast them. Mariah understands that deeply.', choices:[
        {text:'What has she built that lasts?', next:'oss'},
        {text:'Wise words. Goodbye.', next:null},
      ]},
      oss:{speaker:'Sage ✨', text:'Her open source work has 2,000 stars and growing. The Innovation Center has the full story.', choices:[
        {text:'Show me', action:'open:innovation'},
        {text:'Impressive. Thanks.', next:null},
      ]},
    }
  },
};

const NPCS = [
  {id:'old-dev', name:'Old Dev',  x:26*TILE, y:16*TILE, color:0x8b6f47},
  {id:'designer',name:'Pixel',    x:11*TILE, y:20*TILE, color:0xc47dc4},
  {id:'scout',   name:'Scout',    x:35*TILE, y:20*TILE, color:0x4a7ac4},

function openPageFrom(key, src) {
  pageSource = src;
  const pg = document.getElementById('page');
  const content = document.getElementById('pgContent');

  const types = {home:'default',devlab:'default',studio:'design',innovation:'dark',library:'default',townhall:'default'};
  pg.className = types[key] || 'default';

  const isDark = types[key] === 'dark';
  const pillClass = isDark ? 'pg-pill dk' : 'pg-pill';
  const pills = PAGE_ORDER.map(k=>
    `<button class="${pillClass}${k===key?' on':''}" onclick="openPageFrom('${k}','${src}')">${PAGE_NAMES[k]}</button>`
  ).join('');

  const backLabel = src==='game' ? '◀ BACK TO VALLEY' : '◀ BACK';
  const backClass = src==='game' ? 'pg-back game-src' : 'pg-back land-src';
  const backFn = src==='game' ? 'closePg()' : 'closePgToLand()';

  content.innerHTML = `
    <div class="pg-top">
      <button class="${backClass}" onclick="${backFn}">${backLabel}</button>
      <div class="pg-pills">${pills}</div>
    </div>
    ${renderPage(key, isDark)}
  `;

  pg.style.display = 'block';
  requestAnimationFrame(()=> pg.classList.add('vis'));
}

let phaserGame, gameScene;

function startGame() {
  splash(()=>{
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('hud').style.display='block';
    document.getElementById('hint').style.display='block';
    if ('ontouchstart' in window) setupMobile();

    if (!phaserGame) initPhaser();
    else { gameScene.scene.restart(); }
    gameStarted = true;
  });
}

function backToLanding() {
  splash(()=>{
    document.getElementById('landing').classList.remove('hidden');
    document.getElementById('hud').style.display='none';
    document.getElementById('hint').style.display='none';
    document.getElementById('prompt').style.display='none';
    document.getElementById('dialogue').style.display='none';
    document.getElementById('dpad').style.display='none';
    document.getElementById('ekey').style.display='none';
    closePg();
    activeDialogue = null;
  });
}

function initPhaser() {
  phaserGame = new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-canvas-container',
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#3d6b4a',
    physics: { default:'arcade', arcade:{ debug:false } },
    scene: { preload, create, update },
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
  });
}

// ── PHASER SCENE FUNCTIONS ──

let player, cursors, keys2, eKey;
let playerBody;
let npcSprites = {};
let camera;
let moving = false, facing = 'down', frame = 0, ft = 0;

function preload() {}

function create() {
  const scene = this;
  gameScene = scene;

  // World bounds
  scene.physics.world.setBounds(0, 0, WW*TILE, WH*TILE);

  // Ground
  drawGround(scene);
  drawBuildings(scene);
  spawnNPCs(scene);

  // Player (rect until spritesheet ready)
  player = scene.add.rectangle(WW/2*TILE, WH/2*TILE+80, 12, 20, 0x4a6fa5);
  scene.physics.add.existing(player);
  player.body.setCollideWorldBounds(true).setSize(12,14);

  // Camera
  camera = scene.cameras.main;
  camera.setBounds(0, 0, WW*TILE, WH*TILE);
  camera.startFollow(player, true, 0.1, 0.1);
  camera.setZoom(2.2);

  // Input
  cursors = scene.input.keyboard.createCursorKeys();
  keys2 = {
    w: scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W),
    a: scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A),
    s: scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S),
    d: scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D),
  };
  eKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
  scene.input.keyboard.on('keydown-E', handleInteract);
  scene.input.keyboard.on('keydown-ENTER', handleInteract);
  scene.input.keyboard.on('keydown-ESC', ()=>{ closePg(); closeDialogue(); });
}

function update(time, delta) {
  if (!player || document.getElementById('page').classList.contains('vis')) return;
  if (activeDialogue) { player.body.setVelocity(0); return; }

  const speed = 100;
  player.body.setVelocity(0);
  let dx=0, dy=0;
  if (cursors.left.isDown  || keys2.a.isDown) dx=-1;
  if (cursors.right.isDown || keys2.d.isDown) dx=1;
  if (cursors.up.isDown    || keys2.w.isDown) dy=-1;
  if (cursors.down.isDown  || keys2.s.isDown) dy=1;
  if (dx) player.body.setVelocityX(dx*speed);
  if (dy) player.body.setVelocityY(dy*speed);
  if (dx && dy) player.body.velocity.scale(0.707);
  moving = !!(dx||dy);
  if (dx<0) facing='left'; else if(dx>0) facing='right';
  else if (dy<0) facing='up'; else if(dy>0) facing='down';

  // Proximity
  checkProximity();

  // NPC idle bob (handled by tweens)
}

function drawGround(scene) {
  const g = scene.add.graphics();
  g.fillStyle(0x3d6b4a); g.fillRect(0,0,WW*TILE,WH*TILE);
  // Path
  g.fillStyle(0xc4995a);
  g.fillRect(0, WH/2*TILE-TILE, WW*TILE, TILE*2);
  g.fillRect(WW/2*TILE-TILE, 0, TILE*2, WH*TILE);
  // Grass patches
  g.fillStyle(0x4a8a5a, 0.3);
  for (let i=0; i<120; i++) {
    g.fillRect(sr(i*7)*WW*TILE, sr(i*13)*WH*TILE, 8+sr(i*3)*20, 5+sr(i*5)*14);
  }
  // Flowers
  const fc = [0xff8fab,0xffd93d,0xc7f2a4,0xaed9e0];
  for (let i=0; i<100; i++) {
    g.fillStyle(fc[i%fc.length]);
    g.fillRect(sr(i*11)*WW*TILE, sr(i*17)*WH*TILE, 3,3);
  }
  // Trees
  for (let i=0; i<50; i++) {
    let tx = Math.floor(sr(i*29)*WW), ty = Math.floor(sr(i*31)*WH), ok=true;
    for(const b of BUILDINGS){if(tx>=b.x-2&&tx<=b.x+b.w+2&&ty>=b.y-2&&ty<=b.y+b.h+2){ok=false;break;}}
    const cx=WW/2, cy=WH/2;
    if(Math.abs(ty-cy)<2||Math.abs(tx-cx)<2) ok=false;
    if(!ok) continue;
    const sx=tx*TILE, sy=ty*TILE;
    g.fillStyle(0x5a3a1a); g.fillRect(sx+11,sy+18,8,14);
    g.fillStyle(0x1e4a14); g.fillTriangle(sx+16,sy,sx+29,sy+20,sx+3,sy+20);
    g.fillStyle(0x2a6a1e); g.fillTriangle(sx+16,sy+8,sx+30,sy+28,sx+2,sy+28);
    g.fillStyle(0x3a8a2a); g.fillTriangle(sx+16,sy+14,sx+28,sy+32,sx+4,sy+32);
  }
}

function drawBuildings(scene) {
  const g = scene.add.graphics();
  for (const b of BUILDINGS) {
    const bx=b.x*TILE, by=b.y*TILE, bw=b.w*TILE, bh=b.h*TILE;
    // Shadow
    g.fillStyle(0x000000,0.16); g.fillRect(bx+5,by+bh-2,bw+4,9);
    // Wall
    g.fillStyle(b.c); g.fillRect(bx,by+TILE,bw,bh-TILE);
    // Wall shade
    g.fillStyle(0x000000,0.1); g.fillRect(bx+bw-6,by+TILE,6,bh-TILE);
    // Roof
    g.fillStyle(b.r); g.fillTriangle(bx-7,by+TILE,bx+bw/2,by,bx+bw+7,by+TILE);
    g.fillStyle(0x000000,0.12); g.fillTriangle(bx+bw/2,by,bx+bw+7,by+TILE,bx+bw,by+TILE);
    // Windows
    g.fillStyle(0x9ad4ee);
    const wc = bw>=7*TILE?3:2;
    for(let wi=0;wi<wc;wi++){
      const wx=bx+8+wi*(bw/wc); const wy=by+TILE+8;
      g.fillRect(wx,wy,16,12);
      g.fillStyle(0xffffff,0.25); g.fillRect(wx+7,wy,2,12); g.fillRect(wx,wy+5,16,2);
      g.fillStyle(0x9ad4ee);
    }
    // Door
    g.fillStyle(0x2a1a0a); g.fillRect(bx+bw/2-TILE/2,by+bh-TILE,TILE,TILE);
    g.fillStyle(0xc8a04a);
    g.fillRect(bx+bw/2-TILE/2-2,by+bh-TILE-4,TILE+4,4);
    g.fillRect(bx+bw/2-TILE/2-2,by+bh-TILE-4,2,TILE+4);
    g.fillRect(bx+bw/2+TILE/2,by+bh-TILE-4,2,TILE+4);
    // Sign
    scene.add.text(bx+bw/2, by+TILE*2+2, b.label, {
      fontFamily:'"Press Start 2P"', fontSize:'5px',
      color:'#3a2a0a', backgroundColor:'#f0d8a0', padding:{x:3,y:2}
    }).setOrigin(0.5);
    scene.add.text(bx+bw/2, by+TILE-3, b.sign, {fontSize:'13px'}).setOrigin(0.5);
  }
}

function spawnNPCs(scene) {
  for (const npc of NPCS) {
    const body = scene.add.rectangle(0,-2,14,20,npc.color);
    const hat = scene.add.rectangle(0,-12,12,5,npc.color-0x222222);
    const nameTag = scene.add.text(0,-24, npc.name, {
      fontFamily:'"Press Start 2P"', fontSize:'5px',
      color:'#ffffff', backgroundColor:'rgba(0,0,0,0.7)', padding:{x:3,y:2}
    }).setOrigin(0.5);
    const ctr = scene.add.container(npc.x, npc.y, [body, hat, nameTag]);
    ctr.npcData = npc;
    npcSprites[npc.id] = ctr;
    // Bob
    scene.tweens.add({
      targets:ctr, y:npc.y-4, yoyo:true, repeat:-1,
      duration:1100+Math.random()*500, ease:'Sine.easeInOut'
    });
  }
}

// ── PROXIMITY ──
function checkProximity() {
  if (!player) return;
  const px = player.x, py = player.y, DIST = 34;
  nearBuilding = null;
  for (const b of BUILDINGS) {
    const bx=(b.x+b.w/2)*TILE, by=(b.y+b.h)*TILE;
    if(Math.abs(px-bx)<b.w*TILE/2+4&&Math.abs(py-by)<DIST) { nearBuilding=b; break; }
  }
  nearNPC = null;
  for (const npc of NPCS) {
    const d=Math.hypot(px-npc.x, py-npc.y);
    if(d<DIST) { nearNPC=npc; break; }
  }
  const prompt = document.getElementById('prompt');
  const has = nearBuilding||nearNPC;
  prompt.style.display = has ? 'block' : 'none';
  if (has) prompt.textContent = nearNPC ? `[ E ] TALK TO ${nearNPC.name.toUpperCase()}` : `[ E ] ENTER ${nearBuilding.label}`;
}

// ── INTERACT ──
function handleInteract() {
  if (document.getElementById('page').classList.contains('vis')) return;
  if (activeDialogue) { advanceDialogue(); return; }
  if (nearNPC) startDialogue(nearNPC.id);
  else if (nearBuilding) enterBuilding(nearBuilding);
}

function enterBuilding(b) {
  visited.add(b.id);
  if (visited.size === 6) showToast('🏆 WORLD EXPLORER — Visited all buildings!');

  if (!gameScene) { openPageFrom(b.pk,'game'); return; }
  // Zoom + fade
  gameScene.cameras.main.zoomTo(4.5, 380, 'Sine.easeIn');
  setTimeout(()=>{
    gameScene.cameras.main.fadeOut(220,0,0,0);
  }, 340);
  setTimeout(()=>{
    gameScene.cameras.main.resetFX();
    gameScene.cameras.main.setZoom(2.2);
    openPageFrom(b.pk,'game');
  }, 620);
}

// ── DIALOGUE ──
function startDialogue(npcId) {
  const tree = DIALOGUES[npcId];
  if (!tree) return;
  talked.add(npcId);
  if (talked.size === 4) showToast('🏆 PEOPLE PERSON — Talked to everyone!');
  activeDialogue = { tree, lineId: tree.start };
  renderDlg();
  document.getElementById('dialogue').style.display='block';
}

function renderDlg() {
  if (!activeDialogue) return;
  const { tree, lineId } = activeDialogue;
  const line = tree.lines[lineId];
  if (!line) { closeDialogue(); return; }
  document.getElementById('dlgSpeaker').textContent = line.speaker;
  document.getElementById('dlgBody').textContent = line.text;
  const cc = document.getElementById('dlgChoices');
  cc.innerHTML = '';
  if (line.choices && line.choices.length) {
    line.choices.forEach(choice=>{
      const btn = document.createElement('button');
      btn.className = 'dlg-choice';
      btn.textContent = `▸ ${choice.text}`;
      btn.onclick = () => pickChoice(choice);
      cc.appendChild(btn);
    });
  } else {
    const btn = document.createElement('button');
    btn.className='dlg-choice'; btn.textContent='[ E ] Continue';
    btn.onclick=closeDialogue; cc.appendChild(btn);
  }
}

function advanceDialogue() { /* handled by choice buttons */ }

function pickChoice(choice) {
  if (choice.action) {
    closeDialogue();
    const [type,target] = choice.action.split(':');
    if (type==='open') setTimeout(()=>openPageFrom(target,'game'),200);
    return;
  }
  if (!choice.next) { closeDialogue(); return; }
  activeDialogue.lineId = choice.next;
  renderDlg();
}

function closeDialogue() {
  activeDialogue = null;
  document.getElementById('dialogue').style.display='none';
}

// ── MOBILE ──
function setupMobile() {
  document.getElementById('dpad').style.display='grid';
  document.getElementById('ekey').style.display='flex';
  document.getElementById('hint').style.display='none';
  const map = {'dp-up':'ArrowUp','dp-down':'ArrowDown','dp-left':'ArrowLeft','dp-right':'ArrowRight'};
  for(const[id,key] of Object.entries(map)){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();cursors&&(cursors[key.replace('Arrow','').toLowerCase()].isDown=true);},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();cursors&&(cursors[key.replace('Arrow','').toLowerCase()].isDown=false);},{passive:false});
  }
}

// ── ACHIEVEMENT TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', 3500);
}

// ── SPLASH TRANSITION ──
function splash(cb) {
  const s = document.getElementById('splash');
  s.classList.add('in');
  setTimeout(()=>{ cb(); s.classList.remove('in'); },480);
}

// ── SEEDED RAND ──
function sr(seed) {
  const x = Math.sin(seed+1)*10000;
  return x - Math.floor(x);
}

// Resize Phaser on window resize
window.addEventListener('resize',()=>{
  if(phaserGame) phaserGame.scale.resize(window.innerWidth,window.innerHeight);
});
</script>
